<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="style.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>twitch-website</title>
    </head>
    <body>
        <div class="info-container">
            <h1>DEMO, Not meant to be a practical application.</h1>
        </div>
        <div class="input-container">
            <input id="input-keyword" spellcheck="false" autocomplete="off" placeholder="KEYWORD"/>
            <input id="input-stream" spellcheck="false" autocomplete="off" placeholder="STREAMER"/>
            <button id="connect-button">CONFIRM</button>
        </div>
        <div class="game-container">
            <canvas id="game-canvas" tabindex="0"></canvas>
        </div>
        <div class="time-container"></div>
        <script type="module" src="/src/twitch.ts"></script>
        <script type="module" src="/src/games/game.ts"></script>

        <script id="platformVShader" type="x-shader/x-vertex">
            precision mediump float;

            uniform vec2 resolution;
            uniform float time;

            varying vec3 vWorldPosition;
            varying float nPyRatio;

            struct wave {
                vec2 waveDirection;
                float waveSpeed;
                float waveFreq;
                float waveAmp;
            };

            void main() {
                vec3 newPosition = position;

                vec4 worldSpace = modelMatrix * vec4(position, 1.0);
                vWorldPosition = worldSpace.xyz;

                // Position attribute comes as local space from THREE js. Model turns them to world space
                // View matrix applies camera perspective and projection turns into clip space

                wave wave1 = wave(
                    vec2(1.0, 0.5), 
                    6.0, 
                    30.0, 
                    2.0
                );

                float waveCalc = sin(dot(wave1.waveDirection, newPosition.xz) * wave1.waveFreq + time * wave1.waveSpeed);
                newPosition.y += waveCalc * wave1.waveAmp;
                nPyRatio = newPosition.y / wave1.waveAmp;

                gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(newPosition, 1.0);
            }
        </script>
        <script id="platformFShader" type="x-shader/x-fragment">
            precision mediump float;

            uniform vec2 resolution;
            uniform float time;
            uniform vec3 playerPosition;
            uniform vec3 borderMin;
            uniform vec3 borderMax;

            varying vec3 vWorldPosition;
            varying float nPyRatio;

            const float PI = 3.14159;

            void main() {
                float dist = distance(vWorldPosition, playerPosition);

                float borderMinDistX = distance(vWorldPosition.x, borderMin.x - 5.0);
                float borderMaxDistX = distance(vWorldPosition.x, borderMax.x + 5.0);
                float borderMinDistZ = distance(vWorldPosition.z, borderMin.z - 5.0);

                gl_FragColor = vec4(0.0, 0.0, clamp(1.0 * nPyRatio, 0.9, 1.0), 1.0);

                if (dist <= 7.5) {
                    gl_FragColor = vec4(clamp(1.0 * nPyRatio, 0.25, 1.0), 0.75, 1.0, 1.0);
                }

                if (borderMinDistX <= 0.5 && vWorldPosition.z >= borderMin.z - 5.5) {
                    gl_FragColor = vec4(clamp(1.0 * nPyRatio, 0.25, 1.0), 0.75, 1.0, 1.0);
                } else if (borderMaxDistX <= 0.5 && vWorldPosition.z >= borderMin.z - 5.5) {
                    gl_FragColor = vec4(clamp(1.0 * nPyRatio, 0.25, 1.0), 0.75, 1.0, 1.0);
                } else if (borderMinDistZ <= 0.5 && vWorldPosition.x >= borderMin.x - 5.0 && vWorldPosition.x <= borderMax.x + 5.0) {
                    gl_FragColor = vec4(clamp(1.0 * nPyRatio, 0.25, 1.0), 0.75, 1.0, 1.0);
                }
            }
        </script>
    </body>
</html>
